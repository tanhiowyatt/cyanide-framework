version: 2
updates:
  # Python deps (pip из tox/pyproject.toml)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "daily"
    ignore:
      - dependency-name: "tox*"
      - dependency-name: "ruff"
      - dependency-name: "pytest*"
      - dependency-name: "black"
    open-pull-requests-limit: 5

  # GitHub Actions (tox, codeql-action, ruff-pre-commit)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      security-scanning:
        patterns:
          - "github/codeql-action*"
          - "actions/upload-artifact*"
      testing:
        patterns:
          - "actions/setup-python*"
          - "astral-sh/setup-ruff*"
          - "pre-commit/action*"
    open-pull-requests-limit: 3

  # Docker (honeypot/Proxmox images)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "python"
        update-types: ["version-update:semver-patch"]
    open-pull-requests-limit: 3
