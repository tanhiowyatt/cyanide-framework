    type: generated
    provider: motd_provider
  /proc/meminfo:
    type: generated
    provider: meminfo_provider
  /proc/mounts:
    type: generated
    provider: mounts_provider
  /etc/issue:
    content: "Red Hat Enterprise Linux 9.3 (Plow)\nKernel \\r on an \\m\n\n"
  /etc/shadow:
    type: generated
    provider: shadow_provider

