# grub.cfg - generated by grub2-mkconfig
# Run 'grub2-mkconfig -o /boot/grub2/grub.cfg' to regenerate.

set default="0"
set timeout=5
set timeout_style=countdown

insmod ext2
insmod lvm

menuentry 'Red Hat Enterprise Linux (5.14.0-362.8.1.el9_3.x86_64) 9.3 (Plow)' --class red --class gnu-linux --class gnu --class os {
        load_video
        set gfxpayload=keep
        insmod gzio
        insmod part_msdos
        insmod xfs
        set root='hd0,msdos1'
        if [ x$feature_platform_search_hint = xy ]; then
          search --no-floppy --fs-uuid --set=root --hint-bios=hd0,msdos1 --hint-efi=hd0,msdos1 6d5f4e62-9d69-4039-d9ed-ce4df31b522a
        else
          search --no-floppy --fs-uuid --set=root 6d5f4e62-9d69-4039-d9ed-ce4df31b522a
        fi
        linux   /vmlinuz-5.14.0-362.8.1.el9_3.x86_64 root=/dev/mapper/rhel-root ro crashkernel=1G-4G:192M,4G-64G:256M,64G-:512M rd.lvm.lv=rhel/root rd.lvm.lv=rhel/swap rhgb quiet
        initrd  /initramfs-5.14.0-362.8.1.el9_3.x86_64.img
}
