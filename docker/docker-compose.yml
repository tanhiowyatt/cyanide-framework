services:
  cyanide:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: cyanide
    ports:
      - "2222:2222" # SSH
      - "2223:2223" # Telnet  
      - "2525:2525" # SMTP 
      - "9090:9090" # Metrics
    volumes:
      - ../var/log/cyanide:/app/var/log/cyanide
      - ../var/lib/cyanide:/app/var/lib/cyanide
      - ../:/app:ro
    restart: unless-stopped

    # 🔒 SECURITY (honeypot-ready)
    read_only: true
    tmpfs:
      - /tmp
      - /var/run
      - /app/var/run # Для PID файлов
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE # Для портов <1024
    security_opt:
      - no-new-privileges:true # Блокирует privilege escalation

    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

    environment:
      - PYTHONUNBUFFERED=1

      # --- Honeypot Core ---
      # Hostname reported by the honeypot in the shell
      - HOSTNAME=server01
      # Path to store data (quarantine, etc.)
      - DATA_PATH=var/lib/cyanide/quarantine
      # Path to the filesystem YAML configuration (Active ONLY if OS_PROFILE=custom or random)
      # Options: config/fs-config/fs.ubuntu_22_04.yaml, config/fs-config/fs.debian_11.yaml, etc.
      - FS_YAML=config/fs-config/fs.ubuntu_22_04.yaml
      # OS Consistency Profile: determines filesystem structure and command output styles
      # Options: ubuntu_22_04, debian_11, centos_7, custom, random
      - OS_PROFILE=random
      # DNS Cache TTL in seconds
      - DNS_CACHE_TTL=60

      # --- Session Limits ---
      # Maximum total concurrent sessions allowed
      - MAX_SESSIONS=100
      # Maximum concurrent sessions per IP address
      - MAX_SESSIONS_PER_IP=5
      # Session timeout in seconds (force disconnect if idle/connected too long)
      - SESSION_TIMEOUT=300
      # Max size of quarantine folder in MB before rejecting new file uploads
      - QUARANTINE_MAX_SIZE_MB=500

      # --- SSH ---
      # Enable SSH service
      - SSH_ENABLED=true
      # Port to listen on (matched with host ports below)
      - SSH_PORT=2222

      # --- Telnet ---
      # Enable Telnet service
      - TELNET_ENABLED=true
      - TELNET_PORT=2223

      # --- Machine Learning ---
      # Enable ML anomaly detection
      - ML_ENABLED=true
      # Path to ML anomalies log
      - ML_LOG=var/log/cyanide/cyanideML-log.json
      # Path to the trained ML model file
      - MODEL_PATH=ai_models/cyanideML/cyanideML.pkl

      # --- Cleanup ---
      # Enable automatic cleanup of old logs and quarantine files
      - CLEANUP_ENABLED=true
      # Cleanup interval in seconds
      - CLEANUP_INTERVAL=3600
      # Retention period in days
      - CLEANUP_RETENTION_DAYS=7

      # --- OpenTelemetry (Tracing) ---
      # Enable OTEL tracing
      - OTEL_ENABLED=true
      # OTEL Exporter type (e.g., otlp)
      - OTEL_EXPORTER=otlp
      # Endpoint for OTLP traces (e.g., Jaeger or OTEL Collector)
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318/v1/traces

      # --- VirusTotal ---
      # Enable VirusTotal scanning for uploaded files
      - VIRUSTOTAL_ENABLED=false
      # API Key for VirusTotal
      - VIRUSTOTAL_API_KEY=your_api_key_here

      # --- Metrics ---
      # Enable Prometheus metrics and health check server
      - METRICS_ENABLED=true
      - METRICS_PORT=9090

      # --- SMTP Proxy ---
      # Enable SMTP proxying
      - SMTP_ENABLED=true
      - SMTP_PORT=2525
      - SMTP_TARGET_HOST=jaeger
      - SMTP_TARGET_PORT=25

      # --- Users ---
      # JSON list of user credentials
      # Format: [{"user": "username", "pass": "password"}]
      - 'CYANIDE_USERS=[{"user": "root", "pass": "admin"}, {"user": "admin", "pass": "admin"}]'

    healthcheck:
      test: [ "CMD", "python3", "/app/docker/healthcheck.py" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
