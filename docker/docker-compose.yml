services:
  cyanide:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: cyanide
    ports:
      - "2222:2222" # SSH
      - "2223:2223" # Telnet  
      - "2525:2525" # SMTP 
      - "9090:9090" # Metrics
    volumes:
      - ../var/log/cyanide:/app/var/log/cyanide
      - ../var/lib/cyanide:/app/var/lib/cyanide
      - ../:/app:ro
      - ../config:/app/config:ro
    restart: unless-stopped

    # 🔒 SECURITY (honeypot-ready)
    read_only: true
    tmpfs:
      - /tmp
      - /var/run
      - /app/var/run # Для PID файлов
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE # Для портов <1024
    security_opt:
      - no-new-privileges:true # Блокирует privilege escalation

    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

    environment:
      - PYTHONUNBUFFERED=1

    healthcheck:
      test: [ "CMD-SHELL", "python3 -c \"import socket; s=socket.socket(); exit(s.connect_ex(('127.0.0.1',2222))==0)\"" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
