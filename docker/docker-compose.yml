services:
  cyanide:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: cyanide_honeypot
    ports:
      - "2222:2222"
      - "2223:2223"
      - "9090:9090" # Metrics
    volumes:
      - ../var/log/cyanide:/app/var/log/cyanide
      - ../var/quarantine:/app/var/quarantine
      - ../share/cyanide/fs.pickle:/app/share/cyanide/fs.pickle
      # Mount config if you want to edit it from outside (optional)
      # - ../etc/cyanide.cfg:/app/etc/cyanide.cfg
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
