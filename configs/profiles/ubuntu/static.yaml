static:
  /etc/issue:
    content: "Welcome to {{ os_name }} {{ version_id }} {{ kernel_version }} \\n \\l\n"
  /etc/os-release:
    content: |
      PRETTY_NAME="{{ os_name }} {{ version_id }} LTS"
      NAME="{{ os_name }}"
      VERSION_ID="{{ version_id }}"
      VERSION="{{ version_id }} LTS (Jammy Jellyfish)"
      ID={{ os_id }}
      ID_LIKE=debian
      HOME_URL="https://www.ubuntu.com/"
      SUPPORT_URL="https://help.ubuntu.com/"
      BUG_REPORT_URL="https://bugs.launchpad.net/ubuntu/"
      PRIVACY_POLICY_URL="https://www.ubuntu.com/legal/terms-and-policies/privacy-policy"
      VERSION_CODENAME=jammy
      UBUNTU_CODENAME=jammy
  /etc/hostname:
    content: "{{ hostname }}\n"
  /etc/hosts:
    content: |
      127.0.0.1 localhost
      127.0.1.1 {{ hostname }}

      # The following lines are desirable for IPv6 capable hosts
      ::1     ip6-localhost ip6-loopback
      fe00::0 ip6-localnet
      ff00::0 ip6-mcastprefix
      ff02::1 ip6-allnodes
      ff02::2 ip6-allrouters
  /etc/motd:
    content: |
      Welcome to Ubuntu {{ version_id }} LTS (GNU/Linux {{ kernel_version }} x86_64)

       * Documentation:  https://help.ubuntu.com
       * Management:     https://landscape.canonical.com
       * Support:        https://ubuntu.com/advantage

      0 updates can be applied immediately.

  /etc/group:
    source: "ubuntu/root/etc/group"
  /etc/shadow:
    source: "ubuntu/root/etc/shadow"
  /etc/shells:
    source: "ubuntu/root/etc/shells"
  /etc/ssh/sshd_config:
    source: "ubuntu/root/etc/ssh/sshd_config"
  /home/admin/.bashrc:
    source: "ubuntu/root/home/admin/.bashrc"
  /root/.bashrc:
    source: "ubuntu/root/root/.bashrc"
  /bin/**:
    source: "ubuntu/root/bin/"
  /usr/bin/**:
    source: "ubuntu/root/usr/bin/"
  /etc/**:
    source: "ubuntu/root/etc/"
